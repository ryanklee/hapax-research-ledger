name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  validate-ledger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
      - run: pip install jsonschema
      - run: python scripts/validate_ledger.py

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: "1.25.x"
      - name: Run Gitleaks
        run: |
          tmp="$RUNNER_TEMP/gitleaks-source"
          mkdir -p "$tmp"
          git ls-files -z | rsync --files-from=- --from0 -a ./ "$tmp"/
          go run github.com/zricethezav/gitleaks/v8@latest dir --redact --verbose "$tmp"

  all-green:
    name: all-green
    runs-on: ubuntu-latest
    needs:
      - validate-ledger
      - secrets-scan
    if: always()
    steps:
      - name: Require required jobs to pass
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          if [ "$RESULTS" != "success,success" ]; then
            echo "::error::Required job results: $RESULTS"
            exit 1
          fi
