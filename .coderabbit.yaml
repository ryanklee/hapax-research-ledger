# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
early_access: false

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  review_details: false
  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
    ignore_title_keywords:
      - "WIP"
      - "[skip review]"
    ignore_usernames:
      - "dependabot[bot]"
      - "renovate[bot]"
  path_filters:
    - "!**/.pytest_cache/**"
    - "!**/__pycache__/**"
  path_instructions:
    - path: ".github/workflows/**"
      instructions: |
        Keep Codecov, Semgrep, CodeRabbit, Claude, and Codex checks advisory unless a governed Hapax task explicitly promotes a stable aggregate check to branch protection.
    - path: "*.json"
      instructions: |
        Review ledger JSON for schema validity, controlled vocabulary, numeric-only claims, and consistency between latest.json and dv-ledger.ndjson.
    - path: "*.ndjson"
      instructions: |
        Treat the ledger as append-only; flag edits that rewrite prior observations without explicit governed authority.
    - path: "schema/**"
      instructions: |
        Review schema changes for compatibility with existing observations and preservation of the numeric/no-free-text publication boundary.

chat:
  auto_reply: true
